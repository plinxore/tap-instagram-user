send_anonymous_usage_stats: true
project_id: "tap-instagram-user"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-instagram-user"
    namespace: "tap_instagram_user"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: access_token
      label: Access Token
      description: The Meta client's Long-Lived Token
      kind: password
      sensitive: true

    - name: ig_user_id
      label: Instagram User ID
      description: The professional Instagram account ID

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: >
        Start date on first extraction (ignored once a bookmark exists). No
        default: required on a stream's first run (fails fast if neither this
        nor a per-metric start_date is set).

    - name: days_to_subtract
      kind: integer
      label: Days To Subtract
      description: Overlap window (already-covered days to re-extract on each run)

    - name: period
      label: Period
      description: Granularity requested from the Meta Insights API (`period` parameter)

    - name: timeframe
      label: Timeframe
      description: Optional `timeframe` parameter passed to the Meta Insights API

    - name: metric_type
      label: Metric Type
      description: The `metric_type` parameter passed to the Meta Insights API

    - name: generate_dates_range
      label: Generate Dates Range
      description: >
        'active' (default) = one API call per day; 'inactive' = a single
        call covering the whole since/until range.

    - name: metrics
      kind: array
      label: Metrics
      description: >
        List of metrics (and their breakdowns) to extract. Each entry may
        override start_date/days_to_subtract/period/timeframe/metric_type/
        generate_dates_range. Required.

    - name: media_fields
      kind: array
      label: Media Fields
      description: >
        Fields to request on the `/media` edge for the `ig_media` stream
        (must include media_product_type for the insights children). No
        default; required to enable media extraction.

    - name: media_limit
      kind: integer
      label: Media Limit
      description: Page size (`limit`) for the `/media` edge.

    - name: media_max_pages
      kind: integer
      label: Media Max Pages
      description: >
        Maximum number of pages to fetch from the `/media` edge (safety cap
        against an unbounded pagination loop).

    - name: media_metrics
      kind: array
      label: Media Metrics
      description: >
        Per-post insight metrics to extract; one `ig_media_<metric>` stream
        is generated per metric/breakdown combination. Requires media_fields
        and media_metric_compatibility.

    - name: media_metric_compatibility
      kind: object
      label: Media Metric Compatibility
      description: >
        Maps each media_product_type (FEED/REELS/STORY) to the list of
        metrics valid for it, so invalid metric/type calls are skipped. No
        default; required when media_metrics is set.

    settings_group_validation:
    - [access_token, ig_user_id, metrics]

    # `select` controls which streams run. User-insights and media streams
    # are independent: list only user streams here to skip media entirely
    # (media children additionally depend on the ig_media parent at runtime).
    select:
    - ig_user_*
    - ig_media
    - ig_media_*

    config:
      access_token: $TAP_INSTAGRAM_USER_ACCESS_TOKEN
      ig_user_id: "17841442069516211"
      days_to_subtract: 0
      period: day
      metric_type: total_value
      generate_dates_range: active
      metrics:
      - metric: views
        breakdowns:
        - "follow_type,media_product_type"
        - "follow_type"
        - "media_product_type"
      - metric: reach
        breakdowns:
        - ""
      media_fields:
      - id
      - timestamp
      - media_type
      - media_product_type
      - comments_count
      - like_count
      - media_url
      - owner
      - shortcode
      - username
      - thumbnail_url
      media_limit: 100
      media_max_pages: 100
      media_metrics:
      - metric: reach
      - metric: views
      media_metric_compatibility:
        FEED: [comments, facebook_views, follows, impressions, likes, profile_activity, profile_visits, reach, reposts, saved, shares, total_interactions, views, total_comments, total_likes, total_views]
        REELS: [comments, crossposted_views, facebook_views, ig_reels_avg_watch_time, ig_reels_video_view_total_time, likes, reach, reels_skip_rate, reposts, saved, shares, total_interactions, views, total_comments, total_likes, total_views]
        STORY: [facebook_views, follows, impressions, link_clicks, navigation, profile_activity, profile_visits, reach, replies, reposts, shares, total_views]

  loaders:
  # Settings already defined on MeltanoHub for this variant, no need to
  # redeclare them here: https://hub.meltano.com/loaders/target-postgres--transferwise
  - name: target-postgres
    variant: transferwise
    pip_url: pipelinewise-target-postgres

    config:
      host: localhost
      port: 5432
      user: admin
      password: $TARGET_POSTGRES_PASSWORD
      dbname: my_database
      default_target_schema: public
      add_metadata_columns: true

  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
