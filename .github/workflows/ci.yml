name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from git tags, so the full history
          # is needed for the editable install to build.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the tap and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "pytest>=9" "singer-sdk[testing]"

      - name: Run tests
        run: python -m pytest -v

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the tap and lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . ruff mypy "singer-sdk[testing]" "types-python-dateutil~=2.9"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy tap_instagram_user/
